<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>Hermes Pipeline Visualizer</title>
  <style>
    body { font: 13px system-ui, -apple-system, sans-serif; margin: 0; display: grid;
           grid-template-columns: 1fr 340px; height: 100vh; background: #fafafa; }
    #main { display: flex; flex-direction: column; min-width: 0; }
    #toolbar { padding: 12px; border-bottom: 1px solid #ddd; background: #fff; }
    #toolbar h1 { margin: 0 0 8px 0; font-size: 16px; }
    #toolbar p { margin: 0 0 6px 0; color: #666; font-size: 12px; }
    #toolbar textarea { width: 100%; height: 70px; font: 12px monospace;
                        border: 1px solid #ccc; border-radius: 4px; padding: 6px;
                        box-sizing: border-box; resize: vertical; }
    #toolbar .row { display: flex; gap: 8px; margin-top: 6px; }
    #toolbar button { padding: 6px 14px; border: 1px solid #888; background: #fff;
                      border-radius: 4px; cursor: pointer; font-size: 12px; }
    #toolbar button:hover { background: #f0f0f0; }
    #toolbar button.primary { background: #0066ff; color: #fff; border-color: #0066ff; }
    #toolbar button.primary:hover { background: #0052cc; }
    #toolbar #status { margin-left: 8px; font-size: 12px; color: #888; }
    #graph-wrap { flex: 1; overflow: auto; background:
                  repeating-linear-gradient(0deg, #fff, #fff 19px, #f5f5f5 19px, #f5f5f5 20px),
                  repeating-linear-gradient(90deg, #fff, #fff 19px, #f5f5f5 19px, #f5f5f5 20px); }
    #graph { display: block; }
    #sidebar { border-left: 1px solid #ddd; padding: 14px; overflow: auto;
               background: #fff; }
    #sidebar h3 { margin: 0 0 12px 0; font-size: 14px; }
    #sidebar h4 { margin: 12px 0 4px 0; font-size: 12px; color: #0066ff;
                  font-family: monospace; }
    #sidebar h5 { margin: 12px 0 4px 0; font-size: 11px; color: #888;
                  text-transform: uppercase; letter-spacing: 0.5px; }
    #sidebar pre { background: #f5f5f5; border-radius: 4px; padding: 8px;
                   font-size: 11px; overflow-x: auto; margin: 0; }
    #sidebar code { font-size: 12px; }
    #sidebar .empty { color: #999; font-style: italic; padding: 20px 0; }
    .node rect { stroke: #333; stroke-width: 1.5; rx: 6; }
    .node text { font: 11px monospace; pointer-events: none; }
    .edge { stroke: #888; fill: none; marker-end: url(#arrow); }
    .node.selected rect { stroke: #0066ff; stroke-width: 3; }
    .node:hover rect { stroke: #0066ff; stroke-width: 2.5; }
    .legend { padding: 8px 12px; border-top: 1px solid #ddd; background: #fff;
              font-size: 11px; }
    .legend span { display: inline-block; margin-right: 12px; }
    .legend .swatch { display: inline-block; width: 12px; height: 12px;
                      border: 1px solid #333; margin-right: 4px; vertical-align: middle; }
  </style>
  <script src="https://d3js.org/d3.v7.min.js"></script>
</head>
<body>
  <div id="main">
    <div id="toolbar">
      <h1>🔮 Hermes Pipeline Visualizer</h1>
      <p>Pega un <code>PipelineGraph</code> JSON, arrastra un archivo, o usa el botón "Cargar demo":</p>
      <textarea id="paste" placeholder='{ "version": "0.1.0", ... }'></textarea>
      <div class="row">
        <button id="render" class="primary">Renderizar</button>
        <button id="load-demo" title="16 nodos, layout manual">Cargar demo Hyle (16 nodos)</button>
        <button id="load-demo-big" title="50 nodos, requiere CDN dagre.js">Cargar demo 50 nodos (dagre)</button>
        <input type="file" id="file" accept=".json" style="display:none">
        <button onclick="document.getElementById('file').click()">Archivo...</button>
        <span id="status"></span>
      </div>
    </div>
    <div id="graph-wrap"><svg id="graph" width="100%" height="100%"></svg></div>
    <div class="legend">
      <span><span class="swatch" style="background:#a0c4ff"></span>causal_chain</span>
      <span><span class="swatch" style="background:#fdffb6"></span>cycle_verdict</span>
      <span><span class="swatch" style="background:#bdb2ff"></span>agent_output</span>
      <span><span class="swatch" style="background:#ffafcc"></span>attention_context</span>
      <span><span class="swatch" style="background:#f1c0e8"></span>pair_data</span>
      <span><span class="swatch" style="background:#caffbf"></span>object</span>
      <span><span class="swatch" style="background:#bde0fe"></span>number</span>
      <span><span class="swatch" style="background:#e8e8e8"></span>string</span>
    </div>
  </div>
  <aside id="sidebar">
    <h3>Inspector</h3>
    <div id="details" class="empty">Selecciona un nodo para inspeccionarlo</div>
  </aside>

<script>
"use strict";

// === Color map: output type → fill ===
const COLOURS = {
  string:"#e8e8e8", number:"#bde0fe", boolean:"#ffd6a5",
  object:"#caffbf", array:"#9bf6ff", null:"#eeeeee",
  causal_chain:"#a0c4ff", agent_output:"#bdb2ff",
  attention_context:"#ffafcc", quality_breakdown:"#ffc8dd",
  cycle_verdict:"#fdffb6", perception_bundle:"#d0f4de",
  pair_data:"#f1c0e8",
};
const DEFAULT_COLOUR = "#ffffff";

// === Status helper ===
function setStatus(msg, isError) {
  const el = document.getElementById("status");
  el.textContent = msg;
  el.style.color = isError ? "#cc0000" : "#888";
}

// === Build edge list from Ref inputs ===
function buildEdges(nodes) {
  const edges = [];
  nodes.forEach(n => {
    Object.entries(n.inputs).forEach(([k, v]) => {
      if (v && typeof v === "object" && "from" in v && "output" in v) {
        edges.push({ from: v.from, to: n.id, via: v.output, via_key: k });
      }
    });
  });
  return edges;
}

// === Layout decision: threshold for switching from manual to dagre ===
// Manual layout: zero dependencies, fast for small graphs (<30 nodes).
// Dagre layout: requires CDN, scales gracefully to large graphs (>=30 nodes).
const DAGRE_THRESHOLD = 30;

function shouldUseDagre(nodeCount, threshold = DAGRE_THRESHOLD) {
  return nodeCount >= threshold;
}

// === Hierarchical layout (deps-left, no dagre needed for MVP) ===
function layoutManual(nodes, edges) {
  const byId = Object.fromEntries(nodes.map(n => [n.id, n]));
  const depth = {};
  function visit(id, seen) {
    seen = seen || new Set();
    if (id in depth) return depth[id];
    if (seen.has(id)) return 0;  // cycle guard
    seen.add(id);
    const deps = edges.filter(e => e.to === id).map(e => e.from);
    depth[id] = deps.length === 0
      ? 0
      : 1 + Math.max.apply(null, deps.map(d => visit(d, seen)));
    return depth[id];
  }
  nodes.forEach(n => visit(n.id));
  const byDepth = {};
  Object.entries(depth).forEach(([id, d]) => {
    (byDepth[d] = byDepth[d] || []).push(id);
  });
  const xStep = 220, yStep = 90;
  const pos = {};
  for (const dStr of Object.keys(byDepth)) {
    const d = parseInt(dStr, 10);
    byDepth[d].forEach((id, i) => {
      pos[id] = { x: 30 + d * xStep, y: 30 + i * yStep };
    });
  }
  return pos;
}

// === Dagre layout: lazy-loaded from CDN only when needed ===
// dagre is a layered graph layout library (~70KB minified). We load it
// only when the graph crosses DAGRE_THRESHOLD, so small graphs work fully
// offline. Loaded script tag is cached by the browser so subsequent large
// graphs in the same session don't re-download.
function loadDagre() {
  if (window.dagre) return Promise.resolve(window.dagre);
  return new Promise((resolve, reject) => {
    const s = document.createElement("script");
    s.src = "https://cdn.jsdelivr.net/npm/dagre@0.8.5/dist/dagre.min.js";
    s.onload = () => resolve(window.dagre);
    s.onerror = () => reject(new Error("Failed to load dagre.js from CDN"));
    document.head.appendChild(s);
  });
}

async function layoutDagre(nodes, edges) {
  const dagre = await loadDagre();
  const g = new dagre.graphlib.Graph();
  g.setGraph({ rankdir: "LR", nodesep: 40, ranksep: 80, marginx: 20, marginy: 20 });
  g.setDefaultEdgeLabel(() => ({}));
  nodes.forEach(n => g.setNode(n.id, { width: 180, height: 60 }));
  edges.forEach(e => g.setEdge(e.from, e.to));
  dagre.layout(g);
  const pos = {};
  nodes.forEach(n => {
    const p = g.node(n.id);
    // dagre returns center coords; top-left for SVG translate
    pos[n.id] = { x: p.x - 90, y: p.y - 30 };
  });
  return pos;
}

let selected = null;

async function render(graph) {
  if (!graph || !graph.nodes || !graph.nodes.length) {
    setStatus("JSON inválido: falta 'nodes'", true);
    return;
  }
  setStatus(`Renderizando ${graph.nodes.length} nodos...`, false);
  const svg = d3.select("#graph");
  svg.selectAll("*").remove();

  // Defs: arrow marker
  const defs = svg.append("defs");
  defs.append("marker")
     .attr("id", "arrow").attr("viewBox", "0 -5 10 10")
     .attr("refX", 18).attr("refY", 0)
     .attr("markerWidth", 8).attr("markerHeight", 8)
     .attr("orient", "auto")
     .append("path").attr("d", "M0,-5L10,0L0,5").attr("fill", "#888");

  const edges = buildEdges(graph.nodes);
  // Choose layout strategy: manual for small graphs, dagre (CDN) for big ones
  let pos;
  if (shouldUseDagre(graph.nodes.length)) {
    try {
      setStatus(`Cargando dagre.js desde CDN (grafo de ${graph.nodes.length} nodos)...`, false);
      pos = await layoutDagre(graph.nodes, edges);
    } catch (e) {
      setStatus(`dagre.js falló (${e.message}) — fallback a manual`, true);
      pos = layoutManual(graph.nodes, edges);
    }
  } else {
    pos = layoutManual(graph.nodes, edges);
  }

  // Compute SVG dimensions from layout
  const maxX = Math.max.apply(null, Object.values(pos).map(p => p.x)) + 250;
  const maxY = Math.max.apply(null, Object.values(pos).map(p => p.y)) + 100;
  svg.attr("width", maxX).attr("height", maxY);

  // Edges
  svg.append("g").selectAll("path.edge").data(edges).enter().append("path")
     .attr("class", "edge")
     .attr("d", d => {
       const a = pos[d.from], b = pos[d.to];
       if (!a || !b) return "";
       return `M${a.x+180},${a.y+30} C${a.x+220},${a.y+30} ${b.x-40},${b.y+30} ${b.x},${b.y+30}`;
     });

  // Nodes
  const nodeG = svg.append("g").selectAll("g.node")
     .data(graph.nodes, d => d.id).enter().append("g")
     .attr("class", "node")
     .attr("transform", d => `translate(${pos[d.id].x},${pos[d.id].y})`)
     .style("cursor", "pointer")
     .on("click", (_, d) => {
       selected = d;
       d3.selectAll(".node").classed("selected", n => n.id === d.id);
       renderSidebar(d);
     });

  nodeG.append("rect")
     .attr("width", 180).attr("height", 60)
     .attr("fill", d => {
        const firstOutput = Object.values(d.outputs)[0];
        return COLOURS[firstOutput ? firstOutput.type : null] || DEFAULT_COLOUR;
     });

  nodeG.append("text").attr("x", 8).attr("y", 16)
     .text(d => d.id).attr("font-weight", "bold");
  nodeG.append("text").attr("x", 8).attr("y", 32)
     .text(d => d.class_type);
  nodeG.append("text").attr("x", 8).attr("y", 50)
     .text(d => `→ ${Object.entries(d.outputs).map(([k,v]) => `${k}:${v.type}`).join(", ")}`)
     .attr("fill", "#555");

  setStatus(`✓ ${graph.nodes.length} nodos, ${edges.length} edges`, false);
}

function renderSidebar(d) {
  const el = document.getElementById("details");
  el.classList.remove("empty");
  el.innerHTML = `
    <h4>${d.id}</h4>
    <p><b>class_type:</b></p>
    <pre>${escapeHtml(d.class_type)}</pre>
    <h5>Inputs</h5>
    <pre>${escapeHtml(JSON.stringify(d.inputs, null, 2))}</pre>
    <h5>Outputs</h5>
    <pre>${escapeHtml(JSON.stringify(d.outputs, null, 2))}</pre>
    ${d.title ? `<h5>Title</h5><pre>${escapeHtml(d.title)}</pre>` : ""}
  `;
}

function escapeHtml(s) {
  if (typeof s !== "string") s = JSON.stringify(s, null, 2);
  return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
}

// === Wire up controls ===
document.getElementById("render").onclick = () => {
  try {
    render(JSON.parse(document.getElementById("paste").value));
  } catch (e) {
    setStatus("JSON inválido: " + e.message, true);
  }
};

document.getElementById("file").onchange = async (e) => {
  const text = await e.target.files[0].text();
  document.getElementById("paste").value = text;
  try { render(JSON.parse(text)); } catch (err) { setStatus("JSON inválido: " + err.message, true); }
};

// Helper to load a demo JSON by relative path.
// Uses URL resolution (not string concat) so the same call works at any
// deployment depth. `relativePath` should start with "/" if you mean
// "relative to the project root", or be a plain filename for "same dir".
// This way the same visualizer.html works when served from:
//   - /visualizer/visualizer.html (local: `python -m http.server` from project root)
//   - /index.html (GitHub Pages: https://<user>.github.io/<repo>/)
function loadDemoJson(relativePath) {
  // Resolve relative to the project root (the directory ABOVE /visualizer/
  // for local, and the same as the URL path for GitHub Pages).
  // window.location.pathname looks like:
  //   Local:  /visualizer/visualizer.html → /visualizer
  //   Pages:  /index.html                 → "" (no /visualizer/ segment)
  // We need to strip the /visualizer/ segment too for local to get the
  // project root, but for Pages "" already IS the project root.
  let dir = window.location.pathname.replace(/\/[^/]*$/, "");  // strip filename
  dir = dir.replace(/\/visualizer$/, "");                       // strip /visualizer (local only)
  // Now `dir` is the project root in both contexts:
  //   Local:  "" (or whatever path the server is rooted at)
  //   Pages:  ""
  // Use URL resolution to handle slashes correctly:
  const url = new URL(dir + relativePath, window.location.href).href;
  return fetch(url)
    .then(r => {
      if (!r.ok) throw new Error(`HTTP ${r.status} loading ${url}`);
      return r.text();
    })
    .then(text => {
      document.getElementById("paste").value = text;
      return JSON.parse(text);
    });
}

document.getElementById("load-demo").onclick = () => {
  loadDemoJson("/demos/hyle_cycle/hyle_cycle.json")
    .then(graph => render(graph))
    .catch(err => setStatus("Demo no encontrada: " + err.message, true));
};

document.getElementById("load-demo-big").onclick = () => {
  loadDemoJson("/demos/big_graph/big_graph.json")
    .then(graph => render(graph))
    .catch(err => setStatus("Demo no encontrada: " + err.message, true));
};

// Drag & drop
document.body.ondragover = e => e.preventDefault();
document.body.ondrop = async e => {
  e.preventDefault();
  const f = e.dataTransfer.files[0];
  if (!f) return;
  const text = await f.text();
  document.getElementById("paste").value = text;
  try { render(JSON.parse(text)); } catch (err) { setStatus("JSON inválido: " + err.message, true); }
};

// Auto-load demo on first open if no JSON pasted
window.addEventListener("DOMContentLoaded", () => {
  setStatus("Listo. Pega un JSON o click 'Cargar demo'.", false);
});
</script>
</body>
</html>
