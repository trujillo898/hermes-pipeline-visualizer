name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  test:
    name: pytest
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          # cache: pip  # Disabled: project has no requirements.txt/pyproject.toml yet.
          # When you add one, re-enable cache: 'pip' for faster CI runs.

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pydantic pytest pytest-asyncio

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short

      - name: Run demo end-to-end
        run: python demos/hyle_cycle/run.py
